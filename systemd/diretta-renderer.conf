# Diretta Host Daemon Configuration
#
# This file is sourced by the systemd service unit.
# Modify these values to change daemon behavior.
#
# After changing values, reload:
#   sudo systemctl daemon-reload
#   sudo systemctl restart diretta-renderer

# ============================================================================
# BASIC SETTINGS
# ============================================================================

# Target Diretta device number
# 0 = no target (use IPC select_target to choose at runtime)
# 1, 2, 3... = auto-select target at startup
TARGET=0

# IPC socket path (for Go player integration)
SOCKET_PATH="/tmp/diretta-renderer.sock"

# Log verbosity
# Options:
#   ""          - Normal output (INFO level, default)
#   "--verbose" - Debug logs (all messages)
#   "--quiet"   - Warnings and errors only
VERBOSE=""

# ============================================================================
# NETWORK INTERFACE SETTINGS (for multi-homed systems)
# ============================================================================
#
# For systems with multiple network interfaces, specify which interface
# to use for Diretta communication.
#
# Examples:
#   INTERFACE="eth0"           # Use interface name (recommended)
#   INTERFACE="192.168.1.10"   # Use specific IP address
#   INTERFACE=""               # Auto-detect (default)
#
# To list your network interfaces:
#   ip link show
#   ip addr show
#
INTERFACE=""

# ============================================================================
# ADVANCED DIRETTA SDK SETTINGS
# ============================================================================
# Leave commented to use defaults. Uncomment and modify to override.

# Thread Mode (bitmask - add values together)
# Default: 1 (Critical only)
#
# Available flags:
#   1     = Critical (REALTIME priority)
#   2     = NoShortSleep
#   4     = NoSleep4Core
#   8     = SocketNoBlock
#   16    = OccupiedCPU
#   32    = FEEDBACK (moving average)
#   64    = FEEDBACK (moving average)
#   128   = FEEDBACK (moving average)
#   256   = NOFASTFEEDBACK
#   512   = IDLEONE
#   1024  = IDLEALL
#   2048  = NOSLEEPFORCE
#   4096  = LIMITRESEND
#   8192  = NOJUMBOFRAME
#   16384 = NOFIREWALL
#   32768 = NORAWSOCKET
#
# Examples:
#   1     = Default (Critical only)
#   17    = Critical + OccupiedCPU (1+16)
#   33    = Critical + FEEDBACK32 (1+32)
#
#THREAD_MODE=1

# Transfer Packet Cycle Maximum Time (microseconds)
# Default: 10000 (10ms)
# Range: 333-10000
#CYCLE_TIME=10000

# Transfer Packet Cycle Minimum Time (microseconds)
# Only used in random mode
# Default: 333
#CYCLE_MIN_TIME=333

# Information Packet Cycle Time (microseconds)
# Default: 100000 (100ms)
#INFO_CYCLE=100000

# Transfer Mode
# Default: auto
# Options: auto, varmax, varauto, fixauto, random
#   auto    = Automatic (VarMax for PCM Hi-Res, VarAuto for DSD/low-bitrate)
#   varmax  = Flex cycle, maximum packet size
#   varauto = Flex cycle, auto-tuned
#   fixauto = Fixed cycle, auto-tuned
#   random  = Random cycle (uses CYCLE_MIN_TIME)
#TRANSFER_MODE=auto

# Target Profile Limit Time (microseconds)
# Default: 0
# 0 = SelfProfile (stable) - manage own profile
# >0 = TargetProfile (experimental) - auto-adapts to system load
#TARGET_PROFILE_LIMIT=0

# MTU (bytes)
# Default: auto-detect
# Common values: 1500 (standard), 9000 (jumbo), 16128 (max jumbo)
#MTU=""

# ============================================================================
# PROCESS PRIORITY SETTINGS
# ============================================================================

# Nice level (-20 = highest priority, 19 = lowest)
# Default: -10 (high priority, suitable for audio)
NICE_LEVEL=-10

# I/O scheduling class
# Options: realtime, best-effort, idle
IO_SCHED_CLASS=realtime

# I/O scheduling priority (0-7, lower = higher priority)
IO_SCHED_PRIORITY=0

# SCHED_FIFO real-time priority for the audio worker thread (1-99)
# Higher = more priority. Only affects the internal audio streaming thread.
# Default: 50 (mid-range real-time)
RT_PRIORITY=50
